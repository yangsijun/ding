name: DingApp
options:
  bundleIdPrefix: dev.sijun
  deploymentTarget:
    iOS: "16.0"
  minimumXcodeGenVersion: 2.35
  defaultConfig: Release
settings:
  ASSETCATALOG_COMPILER_APPICON_NAME: ding_icon

targets:
  DingApp:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: DingApp
        includes:
          - "**/*.swift"
    resources:
      - path: DingApp/Info.plist
      - path: DingApp/DingApp.entitlements
      - path: DingApp/Resources
        type: folder
      - path: ding_icon.icon
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: dev.sijun.ding
      PRODUCT_NAME: DingApp
      CODE_SIGN_ENTITLEMENTS: DingApp/DingApp.entitlements
      INFOPLIST_FILE: DingApp/Info.plist
      SWIFT_VERSION: "5.9"
      IPHONEOS_DEPLOYMENT_TARGET: "16.0"
      ASSETCATALOG_COMPILER_APPICON_NAME: ding_icon
    entitlements:
      path: DingApp.entitlements
      properties:
        aps-environment: development
        com.apple.security.application-groups:
          - group.dev.sijun.ding
    capabilities:
      push_notifications:
        enabled: true
  DingWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: DingWatch
        includes:
          - "**/*.swift"
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: dev.sijun.ding.watchkitapp
      PRODUCT_NAME: DingWatch
      SWIFT_VERSION: "5.9"
      WATCHOS_DEPLOYMENT_TARGET: "10.0"
      GENERATE_INFOPLIST_FILE: "YES"

  DingNotificationService:
    type: app-extension
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: DingNotificationService
        includes:
          - "**/*.swift"
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: dev.sijun.ding.notification-service
      PRODUCT_NAME: DingNotificationService
      CODE_SIGN_ENTITLEMENTS: DingNotificationService/DingNotificationService.entitlements
      SWIFT_VERSION: "5.9"
      IPHONEOS_DEPLOYMENT_TARGET: "16.0"
      GENERATE_INFOPLIST_FILE: "YES"
      INFOPLIST_KEY_NSExtension_NSExtensionPointIdentifier: com.apple.usernotifications.service
    entitlements:
      path: DingNotificationService/DingNotificationService.entitlements
      properties:
        com.apple.security.application-groups:
          - group.dev.sijun.ding
